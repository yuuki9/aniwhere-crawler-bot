# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit 설정 — 위치는 반드시 Git 저장소 루트입니다.
# client/, server/ 등 하위 폴더가 아닙니다. 공식 문서도 동일하게 안내합니다.
#
# 자동 리뷰 대상(base): 기본 브랜치(보통 main)는 항상 포함됩니다.
# base_branches에는 그 외에 자동 리뷰할 머지 대상 브랜치를 정규식으로 추가합니다.
# (패턴 참고: https://docs.coderabbit.ai/configuration/auto-review)

language: ko-KR

reviews:
  auto_review:
    enabled: true
    base_branches:
      - "develop"
      - "release/.*"
