# Crawler/AI API deploy: build image -> upload S3 presign -> SSH/SCP to EC2 host, docker load.
# Compose: docker-compose.ec2.image.yml (image aniwhere-crawler-bot:latest after docker load).
#
# GitHub Actions — SSH 대상 (아래 둘 중 하나)
#
#   (권장) EC2_HOST — 퍼블릭 IP 또는 DNS만. Repository **Variables** 또는 **Secrets**.
#           + EC2_USER — SSH 사용자(예 ec2-user). Variables 또는 Secrets(둘 중 하나면 됨).
#   (호환) EC_HOST — 단일 Secret: `user@host` 이거나 호스트만(IP/DNS). 호스트만일 때는 EC2_USER 필수.
#
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_S3_BUCKET
#   EC2_SSH_KEY    # 배포 호스트 접속용 **개인키 전체 본문** (파일 경로 아님)
#   [선택] EC_HOST_PORT      # SSH 포트(비우면 22).
#   [권장] EC_HOST_SSH_FINGERPRINT — SSH 호스트 공개키 SHA256 지문(MITM 완화). 미설정 시 검증 생략
#
# .env 배포(runner 에서 만들어져 EC2 에 복사):
#   CRAWLER_ENV_B64: production .env (base64). DB_HOST 등 DB 접속 설정 포함.
#
# 또는 CRAWLER_ENV_B64 생략 시 GitHub Secrets 로 최소 .env 생성(DB_*):
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#
# 배포 대상 인스턴스가 S3 presigned URL 에서 이미지를 받으려면 아웃바운드 HTTPS(443) 허용.
#
# Chroma tarball: 레포 의 chromadb/ 커밋 또는 CHROMADB_S3_OBJECT_KEY
#
# Triggers: push main when app/** 등 변경; workflow_dispatch

name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/deploy-ec2.yml"
      - "embed_to_chromadb.py"
      - "process_shops.py"
      - "run_pipeline.py"
      - "retry_failed.py"
      - "chromadb/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-crawler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build image and upload to S3
        id: artifact
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          docker build -t aniwhere-crawler-bot:latest .
          docker save aniwhere-crawler-bot:latest -o /tmp/aniwhere-crawler-image.tar
          OBJECT_KEY="aniwhere-crawler-bot/releases/${GITHUB_SHA}.tar"
          aws s3 cp /tmp/aniwhere-crawler-image.tar "s3://${BUCKET}/${OBJECT_KEY}" --region "${AWS_REGION}"
          PRESIGN=$(aws s3 presign "s3://${BUCKET}/${OBJECT_KEY}" --expires-in 900 --region "${AWS_REGION}")
          B64=$(printf '%s' "$PRESIGN" | base64 -w0)
          echo "presign_b64=$B64" >> "${GITHUB_OUTPUT}"

      - name: Prepare ChromaDB tarball for deploy host
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CHROMADB_S3_OBJECT_KEY: ${{ secrets.CHROMADB_S3_OBJECT_KEY }}
        run: |
          set -euo pipefail
          if [ -d chromadb ] && [ -n "$(ls -A chromadb 2>/dev/null || true)" ]; then
            echo "ChromaDB: packaging chromadb/ from repository"
            tar -czf /tmp/chromadb-deploy.tgz chromadb
          elif [ -n "${CHROMADB_S3_OBJECT_KEY:-}" ]; then
            echo "ChromaDB: downloading s3://${BUCKET}/${CHROMADB_S3_OBJECT_KEY}"
            aws s3 cp "s3://${BUCKET}/${CHROMADB_S3_OBJECT_KEY}" /tmp/chromadb-deploy.tgz --region "${AWS_REGION}"
          else
            echo "::error::ChromaDB missing. Either commit a non-empty ./chromadb directory, or set GitHub secret CHROMADB_S3_OBJECT_KEY (key inside AWS_S3_BUCKET)."
            exit 1
          fi
          ls -la /tmp/chromadb-deploy.tgz

      - name: Stage Chroma tarball beside compose (flat SCP destination)
        run: |
          set -euo pipefail
          cp /tmp/chromadb-deploy.tgz chromadb-deploy.tgz
          ls -la chromadb-deploy.tgz

      - name: Resolve deploy SSH target
        id: ec_host
        env:
          EC2_HOST_VARS: ${{ vars.EC2_HOST }}
          EC2_HOST_SECRETS: ${{ secrets.EC2_HOST }}
          EC2_USER_VARS: ${{ vars.EC2_USER }}
          EC2_USER_SECRETS: ${{ secrets.EC2_USER }}
          EC_HOST: ${{ secrets.EC_HOST }}
          EC_HOST_PORT: ${{ secrets.EC_HOST_PORT }}
        run: |
          set -euo pipefail
          PORT="${EC_HOST_PORT:-22}"
          DEPLOY_HOST="${EC2_HOST_VARS:-}"
          if [ -z "$DEPLOY_HOST" ]; then
            DEPLOY_HOST="${EC2_HOST_SECRETS:-}"
          fi
          DEPLOY_USER_MERGED="${EC2_USER_VARS:-}"
          if [ -z "$DEPLOY_USER_MERGED" ]; then
            DEPLOY_USER_MERGED="${EC2_USER_SECRETS:-}"
          fi

          if [ -n "$DEPLOY_HOST" ]; then
            if [ -z "$DEPLOY_USER_MERGED" ]; then
              echo "::error::EC2_HOST 가 설정되어 있으면 EC2_USER 가 필요합니다 (Repository Variables 또는 Secrets 에 예: ec2-user)."
              exit 1
            fi
            echo "user=${DEPLOY_USER_MERGED}" >> "$GITHUB_OUTPUT"
            echo "host=${DEPLOY_HOST}" >> "$GITHUB_OUTPUT"
            echo "port=${PORT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${EC_HOST:-}" ]; then
            echo "::error::배포 SSH 대상 미설정 — 권장: Variables 또는 Secrets 에 EC2_HOST(IP/DNS) + EC2_USER. 또는 Secrets 에 EC_HOST(user@host 또는 호스트만; 호스트만이면 EC2_USER 필요)."
            exit 1
          fi
          case "$EC_HOST" in
            *@*)
              user="${EC_HOST%%@*}"
              host="${EC_HOST#*@}"
              if [ -z "$user" ] || [ -z "$host" ]; then
                echo "::error::EC_HOST 형식 오류(user@host, 비어 있는 user/host 불가)"
                exit 1
              fi
              echo "user=${user}" >> "$GITHUB_OUTPUT"
              echo "host=${host}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              if [ -z "$DEPLOY_USER_MERGED" ]; then
                echo "::error::EC_HOST 에 @ 없음 — EC2_USER 에 SSH 사용자(예 ec2-user)를 Variables 또는 Secrets 로 설정하세요"
                exit 1
              fi
              echo "user=${DEPLOY_USER_MERGED}" >> "$GITHUB_OUTPUT"
              echo "host=${EC_HOST}" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"

      - name: Copy compose and ChromaDB tarball to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.ec_host.outputs.host }}
          username: ${{ steps.ec_host.outputs.user }}
          port: ${{ steps.ec_host.outputs.port }}
          fingerprint: ${{ secrets.EC_HOST_SSH_FINGERPRINT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.ec2.image.yml,chromadb-deploy.tgz"
          target: "/home/${{ steps.ec_host.outputs.user }}/aniwhere-crawler-bot/"
          timeout: 120s
          command_timeout: 30m

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          PRESIGN_B64: ${{ steps.artifact.outputs.presign_b64 }}
          CRAWLER_ENV_B64: ${{ secrets.CRAWLER_ENV_B64 }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ steps.ec_host.outputs.host }}
          username: ${{ steps.ec_host.outputs.user }}
          port: ${{ steps.ec_host.outputs.port }}
          fingerprint: ${{ secrets.EC_HOST_SSH_FINGERPRINT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: PRESIGN_B64,CRAWLER_ENV_B64,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            REMOTE_DIR="/home/${{ steps.ec_host.outputs.user }}/aniwhere-crawler-bot"
            mkdir -p "$REMOTE_DIR"/data "$REMOTE_DIR"/output
            cd "$REMOTE_DIR"
            rm -rf "$REMOTE_DIR/chromadb"
            tar -xzf "$REMOTE_DIR/chromadb-deploy.tgz" -C "$REMOTE_DIR"
            rm -f "$REMOTE_DIR/chromadb-deploy.tgz"
            URL=$(printf '%s' "$PRESIGN_B64" | base64 -d)
            curl -fSL "$URL" -o /tmp/aniwhere-crawler-image.tar
            sudo docker load -i /tmp/aniwhere-crawler-image.tar
            rm -f /tmp/aniwhere-crawler-image.tar
            umask 077
            if [ -n "${CRAWLER_ENV_B64:-}" ]; then
              printf '%s' "$CRAWLER_ENV_B64" | base64 -d > "$REMOTE_DIR/.env"
            else
              required_vars=(DB_HOST DB_PORT DB_NAME DB_USERNAME DB_PASSWORD)
              for var in "${required_vars[@]}"; do
                if [ -z "${!var:-}" ]; then
                  echo "::error::$var secret is required when CRAWLER_ENV_B64 is not set"
                  exit 1
                fi
              done
              printf '%s\n' \
                'APP_ENV=production' \
                'APP_DEBUG=false' \
                "DB_HOST=${DB_HOST}" \
                "DB_PORT=${DB_PORT}" \
                "DB_NAME=${DB_NAME}" \
                "DB_USERNAME=${DB_USERNAME}" \
                "DB_PASSWORD=${DB_PASSWORD}" \
                > "$REMOTE_DIR/.env"
            fi
            chmod 600 "$REMOTE_DIR/.env" || true
            compose() {
              if sudo docker compose version >/dev/null 2>&1; then
                sudo docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                sudo docker-compose "$@"
              else
                echo "docker compose not found"
                exit 1
              fi
            }
            compose -f docker-compose.ec2.image.yml down 2>/dev/null || true
            compose -f docker-compose.ec2.image.yml up -d
            sudo docker ps -a --filter name=aniwhere-crawler-bot
