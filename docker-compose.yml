# 로컬에서 이미지 빌드 후 기동. DB 설정은 aniwhere-sql-ddl/.env 의 MYSQL_* 를 사용합니다.
#
#   docker compose --env-file ../aniwhere-sql-ddl/.env up --build -d
#
# TMDB: 코드 기본 키 사용. 덮어쓰려면 아래 environment 에 TMDB_API_KEY 를 추가하세요.

services:
  api:
    build: .
    image: aniwhere-crawler-bot:local
    container_name: aniwhere-crawler-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: ${MYSQL_PORT}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      PYTHONPATH: /app
